<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Rompecabezas</title>

<style>

body{
font-family: Arial;
background:#f5e6ff;
text-align:center;
}

h1{
margin-top:20px;
}

#puzzle{
display:grid;
grid-template-columns:repeat(3,120px);
gap:5px;
justify-content:center;
margin-top:30px;
}

.piece{
width:120px;
height:120px;
border:2px solid white;
background-size:360px 360px;
cursor:pointer;
}

#letter{
display:none;
margin-top:50px;
background:white;
padding:30px;
width:400px;
margin-left:auto;
margin-right:auto;
border-radius:15px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
}

</style>
</head>

<body>

<h1>Arma el rompecabezas 🧩</h1>

<div id="puzzle"></div>

<div id="letter">
<h2>💌 Una carta para ti</h2>
<p>
Si llegaste hasta aquí es porque lograste completar el rompecabezas.
Quería decirte algo muy especial...
</p>

<p>
Eres una persona muy importante para mí ❤️
</p>
</div>

<script>

const puzzle = document.getElementById("puzzle");

let order=[0,1,2,3,4,5,6,7,8];

order.sort(()=>Math.random()-0.5);

order.forEach(i=>{
let piece=document.createElement("div");

piece.className="piece";

piece.style.backgroundImage="FOTO 1.JPEG";

let x=(i%3)*120;
let y=Math.floor(i/3)*120;

piece.style.backgroundPosition=`-${x}px -${y}px`;

piece.dataset.correct=i;

piece.dataset.current=order.indexOf(i);

piece.onclick=()=>swap(piece);

puzzle.appendChild(piece);
});

let selected=null;

function swap(piece){

if(!selected){
selected=piece;
piece.style.border="3px solid red";
return;
}

let tempBg=piece.style.backgroundPosition;
piece.style.backgroundPosition=selected.style.backgroundPosition;
selected.style.backgroundPosition=tempBg;

selected.style.border="2px solid white";
selected=null;

checkWin();
}

function checkWin(){

let pieces=document.querySelectorAll(".piece");

let correct=0;

pieces.forEach(p=>{
let bg=p.style.backgroundPosition;

let x=parseInt(bg.split(" ")[0]);
let y=parseInt(bg.split(" ")[1]);

let col=Math.abs(x)/120;
let row=Math.abs(y)/120;

let index=row*3+col;

if(index==p.dataset.correct){
correct++;
}

});

if(correct==9){

document.getElementById("puzzle").style.display="none";

document.getElementById("letter").style.display="block";

}

}

</script>

</body>
</html>
