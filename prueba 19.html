<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💙</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap');

body{
  margin:0;
  font-family:'Poppins', sans-serif;
  background:linear-gradient(to bottom,#e6f2ff,#d6ecff);
  overflow:hidden;
}

/* PANTALLAS */
.screen{
  position:absolute;
  width:100%;
  height:100%;
  display:none;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  text-align:center;
  padding:20px;
  opacity:0;
  transition:0.5s;
}
.active{
  display:flex;
  opacity:1;
}

/* FONDO TEXTURA */
body::before{
  content:"";
  position:absolute;
  width:100%;
  height:100%;
  background:url('https://i.imgur.com/8w0XG6F.png');
  opacity:0.05;
}

/* CORAZONES LATERALES */
.hearts-side{
  position:fixed;
  width:100%;
  height:100%;
  pointer-events:none;
}
.hearts-side span{
  position:absolute;
  font-size:22px;
  animation:floatUp 8s linear infinite;
  opacity:0.5;
}
@keyframes floatUp{
  from{transform:translateY(100vh);}
  to{transform:translateY(-10vh);}
}

/* BORDE ABAJO */
.bottom-border{
  position:fixed;
  bottom:0;
  width:100%;
  height:80px;
  background:linear-gradient(to top,#b3daff,transparent);
}

/* IMAGEN FLOTANTE */
.floating{
  width:200px;
  border-radius:20px;
  box-shadow:0 10px 25px rgba(0,0,0,0.15);
  animation:float 3s infinite ease-in-out;
}
@keyframes float{
  50%{transform:translateY(-15px);}
}

/* TEXTO */
h1,h2{
  color:#3399ff;
}

/* BOTONES */
button{
  padding:12px 20px;
  border:none;
  border-radius:30px;
  background:linear-gradient(45deg,#66b3ff,#99ccff);
  color:white;
  font-size:16px;
  margin:10px;
  cursor:pointer;
  box-shadow:0 5px 15px rgba(0,0,0,0.15);
  transition:0.3s;
}
button:hover{
  transform:scale(1.1);
}

/* BOTON NO ESCAPANDO */
#noBtn{
  position:relative;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:20px;
  padding:20px;
}

/* CARTAS */
.card{
  background:white;
  padding:10px;
  border-radius:20px;
  box-shadow:0 8px 20px rgba(0,0,0,0.15);
  transform:rotate(-2deg);
  transition:0.3s;
}
.card:nth-child(even){
  transform:rotate(2deg);
}
.card:hover{
  transform:scale(1.05) rotate(0);
}
.card img{
  width:100%;
  border-radius:15px;
}

/* ADIOS */
.adios{
  margin-top:20px;
  font-size:18px;
  color:#3399ff;
  cursor:pointer;
}

/* CORAZONES CAIDA */
.heart{
  position:fixed;
  top:-10px;
  animation:fall 3s linear;
}
@keyframes fall{
  to{
    transform:translateY(100vh);
    opacity:0;
  }
}

/* CARRUSEL */
.carousel img{
  width:200px;
  margin:10px;
  border-radius:15px;
  box-shadow:0 5px 10px rgba(0,0,0,0.2);
}

/* EFECTO BRILLO CURSOR */
.sparkle{
  position:fixed;
  pointer-events:none;
  font-size:12px;
  animation:fade 1s linear;
}
@keyframes fade{
  to{opacity:0; transform:scale(2);}
}

</style>
</head>

<body>

<!-- DECORACIONES -->
<div class="hearts-side">
  <span style="left:10%">💙</span>
  <span style="left:30%">💠</span>
  <span style="left:50%">💙</span>
  <span style="left:70%">💎</span>
  <span style="left:90%">💙</span>
</div>
<div class="bottom-border"></div>

<!-- INICIO -->
<div class="screen active" id="inicio">
  <img src="foto1.jpg" class="floating">
  <h1>¿Quieres ver tu regalo? 🎁</h1>
  <div>
    <button onclick="show('opciones')">💙 Sí</button>
    <button id="noBtn">💔 No</button>
  </div>
</div>

<!-- NO -->
<div class="screen" id="no">
  <img src="gif-llorando.gif" width="200">
  <h2>Te prometo que te va a gustar 🥺</h2>
  <button onclick="show('inicio')">Volver</button>
</div>

<!-- OPCIONES -->
<div class="screen" id="opciones">
  <h1>Elige una sorpresa 💌</h1>

  <div class="grid">
    <div class="card" onclick="show('flores')">
      <img src="florcita.png">
    </div>

    <div class="card" onclick="show('carrusel')">
      <img src="foto.jpg">
    </div>

    <div class="card" onclick="show('video')">
      <img src="peli.png">
    </div>

    <div class="card" onclick="show('carta')">
      <img src="carta.png">
    </div>
  </div>

  <p class="adios" onclick="corazones()">adios</p>
</div>

<!-- FLORES -->
<div class="screen" id="flores">
  <img src="flores.jpg" width="250">
  <h2>Para ti 💐</h2>
  <button onclick="show('opciones')">Volver</button>
</div>

<!-- CARRUSEL -->
<div class="screen" id="carrusel">
  <div class="carousel">
    <img src="foto1.jpg">
    <img src="foto2.jpg">
    <img src="foto3.jpg">
  </div>
  <button onclick="show('opciones')">Volver</button>
</div>

<!-- VIDEO -->
<div class="screen" id="video">
  <video controls width="300">
    <source src="video.mp4" type="video/mp4">
  </video>
  <button onclick="show('opciones')">Volver</button>
</div>

<!-- CARTA -->
<div class="screen" id="carta">
  <h2>Para ti 💙</h2>
  <p>
    Eres lo mejor que me ha pasado... 💕<br><br>
    (escribe tu carta aquí 😭)
  </p>
  <button onclick="show('opciones')">Volver</button>
</div>

<script>

/* CAMBIAR PANTALLAS */
function show(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

/* BOTON NO ESCAPA */
const noBtn = document.getElementById("noBtn");
noBtn.addEventListener("mouseover", ()=>{
  noBtn.style.position="absolute";
  noBtn.style.left=Math.random()*80+"%";
  noBtn.style.top=Math.random()*80+"%";
});

/* SI LOGRA DARLE CLICK */
noBtn.addEventListener("click", ()=>{
  show('no');
});

/* CORAZONES */
function corazones(){
  for(let i=0;i<30;i++){
    let heart=document.createElement("div");
    heart.className="heart";
    heart.innerHTML="💙";
    heart.style.left=Math.random()*100+"vw";
    heart.style.fontSize=(10+Math.random()*30)+"px";
    document.body.appendChild(heart);
    setTimeout(()=>heart.remove(),3000);
  }
  setTimeout(()=>{show('inicio');},2000);
}

/* BRILLO CURSOR */
document.addEventListener("mousemove",(e)=>{
  let s=document.createElement("div");
  s.className="sparkle";
  s.innerHTML="✨";
  s.style.left=e.clientX+"px";
  s.style.top=e.clientY+"px";
  document.body.appendChild(s);
  setTimeout(()=>s.remove(),1000);
});

</script>

</body>
</html>
