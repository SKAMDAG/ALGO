<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💖 Para ti</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap');

body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  font-family:'Poppins', sans-serif;
  background: linear-gradient(135deg,#ffd1dc,#c1d3ff);
  text-align:center;
}

/* PANTALLAS */
.screen{
  display:none;
  width:90%;
  max-width:420px;
}

.active{
  display:block;
}

/* BOTONES */
button{
  margin:10px;
  padding:12px 18px;
  border:none;
  border-radius:12px;
  cursor:pointer;
  background:#ff4d7d;
  color:white;
  font-weight:500;
  transition:0.3s;
}

button:hover{
  background:#ff1f5a;
}

/* IMAGEN ENTRADA */
.entry-img{
  width:100%;
  max-width:320px;
  border-radius:20px;
  box-shadow:0 15px 40px rgba(0,0,0,0.25);
  cursor:pointer;
  transition:0.4s;
}

.entry-img:active{
  transform:scale(0.97);
}

/* CARTA */
.card{
  background:white;
  padding:20px;
  border-radius:20px;
  box-shadow:0 15px 40px rgba(0,0,0,0.15);
  text-align:left;
  animation:fadeIn 0.6s ease;
}

@keyframes fadeIn{
  from{opacity:0; transform:scale(0.9);}
  to{opacity:1; transform:scale(1);}
}

h2,h3{
  color:#ff3f77;
}

p{
  line-height:1.6;
  font-size:15px;
  color:#333;
}

/* VIDEO */
video{
  width:100%;
  border-radius:20px;
}
</style>
</head>

<body>

<!-- ENTRADA (FOTO CLICKEABLE) -->
<div class="screen active" id="entryScreen">

  <img src="ghero.png" class="entry-img" onclick="openMenu()">

  <p>Hola.</p>
</div>

<!-- MENU -->
<div class="screen" id="menuScreen">
  <h2></h2>
  <p>Elija qué quiere ver señor:</p>

  <button onclick="openVideo()">🎥</button>
  <button onclick="openLetter()">💌</button>
</div>

<!-- VIDEO -->
<div class="screen" id="videoScreen">
  <h3>🎥 Video especial</h3>

  <video controls>
    <source src="video.mp4" type="video/mp4">
  </video>

  <button onclick="back()">⬅ Volver</button>
</div>

<!-- CARTA -->
<div class="screen" id="letterScreen">
  <div class="card">
    <h3>💌 Carta para ti</h3>

    <p>
      Desde que llegaste, todo se siente diferente… más bonito.<br><br>

      No sé cómo explicarlo, pero me haces bien sin intentarlo.<br><br>

      Eres de esas personas que se quedan en la mente y en el corazón 💖
    </p>

    <p><b>Con cariño,</b><br>Mireya</p>

    <button onclick="back()">⬅ Volver</button>
  </div>
</div>

<script>

function show(id){
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function openMenu(){
  show('menuScreen');
}

function openVideo(){
  show('videoScreen');
}

function openLetter(){
  show('letterScreen');
}

function back(){
  show('menuScreen');
}

</script>

</body>
</html>
