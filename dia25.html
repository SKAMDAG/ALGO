<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>💙 Para ti 💙</title>

<style>
body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:radial-gradient(circle,#0a0f1f,#05070f);
  font-family:'Poppins',sans-serif;
  overflow:hidden;
}

/* APP */
.app{
  position:relative;
  width:320px;
  padding:25px;
  border-radius:25px;
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(20px);
  box-shadow:0 0 40px rgba(102,179,255,0.3);
  text-align:center;
  animation:float 4s ease-in-out infinite;
  overflow:hidden;
}

/* BORDE GLOW */
.app::before{
  content:"";
  position:absolute;
  inset:-2px;
  border-radius:25px;
  background:linear-gradient(45deg,#66b3ff,#a0e7ff,#66b3ff);
  filter:blur(12px);
  z-index:-1;
}

/* 🔥 SCAN HOLOGRAMA */
.app::after{
  content:"";
  position:absolute;
  left:0;
  width:100%;
  height:60px;
  background:linear-gradient(
    to bottom,
    transparent,
    rgba(102,179,255,0.25),
    transparent
  );
  animation:scan 3s linear infinite;
}

@keyframes scan{
  0%{top:-60px;}
  100%{top:100%;}
}

/* FLOTAR */
@keyframes float{
  50%{transform:translateY(-8px);}
}

/* TITULO */
h2{
  color:#9ecbff;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(6,45px);
  gap:10px;
  justify-content:center;
  margin:20px 0;
}

/* CELDAS */
.cell{
  width:45px;
  height:45px;
  border-radius:12px;
  background:rgba(255,255,255,0.08);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:20px;
  cursor:pointer;
  transition:0.3s;
}

.cell:hover{
  transform:scale(1.15);
  background:#66b3ff;
}

/* SELECCION */
.selected{
  outline:2px solid #9ecbff;
  transform:scale(1.2);
}

/* CORRECTO */
.correct{
  background:#9ecbff !important;
  color:black;
  animation:pop 0.3s;
}

/* ERROR */
.error{
  animation:shake 0.3s;
}

/* INPUT */
input{
  width:80px;
  padding:10px;
  border:none;
  border-radius:12px;
  text-align:center;
  font-size:18px;
  outline:none;
  background:rgba(255,255,255,0.1);
  color:white;
}

/* BOTON */
button{
  margin-top:10px;
  padding:8px 20px;
  border:none;
  border-radius:20px;
  background:linear-gradient(45deg,#66b3ff,#99ccff);
  color:white;
  cursor:pointer;
  box-shadow:0 0 10px rgba(102,179,255,0.5);
  transition:0.3s;
}

button:hover{
  transform:scale(1.1);
}

/* MENSAJE */
#msg{
  height:20px;
  color:#9ecbff;
  margin-top:10px;
}

/* CORAZONES */
.heart{
  position:fixed;
  color:#9ecbff;
  animation:floatUp 1s linear;
}

@keyframes floatUp{
  to{transform:translateY(-80px);opacity:0;}
}

/* ANIMACIONES */
@keyframes shake{
  25%{transform:translateX(-5px);}
  50%{transform:translateX(5px);}
  75%{transform:translateX(-5px);}
}

@keyframes pop{
  0%{transform:scale(0.6);}
  100%{transform:scale(1);}
}
</style>
</head>

<body>

<div class="app">
  <h2>Completa 💙</h2>

  <div class="grid" id="grid"></div>

  <input id="letter" maxlength="1" placeholder="?">
  <br>
  <button onclick="confirmar()">💙</button>

  <div id="msg"></div>
</div>

<script>

let seleccion = null;

const letras = [
  "T","_","A","M","O","X",
  "M","I","_","I","D","A"
];

const soluciones = {
  1:"E",
  8:"V"
};

const grid = document.getElementById("grid");

function render(){
  grid.innerHTML="";
  letras.forEach((l,i)=>{
    const div=document.createElement("div");
    div.className="cell";
    div.textContent=l;

    if(l === "_"){
      div.onclick=()=>seleccionar(div,i);
    }

    grid.appendChild(div);
  });
}

function seleccionar(cell,i){
  document.querySelectorAll(".cell").forEach(c=>c.classList.remove("selected"));
  cell.classList.add("selected");
  seleccion={cell,index:i};
  document.getElementById("letter").focus();
}

function confirmar(){
  if(!seleccion) return;

  const input=document.getElementById("letter");
  let letra=input.value.toUpperCase();

  if(letra === soluciones[seleccion.index]){
    seleccion.cell.textContent=letra;
    seleccion.cell.classList.add("correct");
    letras[seleccion.index]=letra;

    hearts();
    showMsg("💙 perfecto");

    checkWin();
  }else{
    seleccion.cell.classList.add("error");
    setTimeout(()=>seleccion.cell.classList.remove("error"),300);
    showMsg("😏 intenta otra vez");
  }

  input.value="";
  seleccion=null;
}

function hearts(){
  for(let i=0;i<10;i++){
    let h=document.createElement("div");
    h.className="heart";
    h.innerHTML="💙";
    h.style.left=Math.random()*100+"vw";
    h.style.top="60%";
    document.body.appendChild(h);
    setTimeout(()=>h.remove(),1000);
  }
}

function showMsg(text){
  document.getElementById("msg").textContent=text;
}

function checkWin(){
  const palabra = letras.join("");

  if(palabra.includes("TEAMO") && palabra.includes("MIVIDA")){
    showMsg("💖 desbloqueaste mi corazón...");
    setTimeout(()=>{
      window.location.href="index.html";
    },1500);
  }
}

render();

</script>

</body>
</html>
