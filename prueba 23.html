<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💙 WhatsApp Love</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,system-ui}

/* SCREENS */
.screen{
  position:absolute;
  width:100%;
  height:100vh;
  display:none;
  justify-content:center;
  align-items:center;
  flex-direction:column;
}
.active{display:flex}

/* 🔒 LOCK */
#lock{
  background:linear-gradient(180deg,#0f2027,#203a43,#2c5364);
  color:white;
}

.timeBig{
  font-size:75px;
  margin-top:100px;
  font-weight:200;
}

/* NOTIF iPHONE */
.notif{
  margin-top:40px;
  width:85%;
  background:rgba(255,255,255,0.15);
  backdrop-filter:blur(15px);
  border-radius:18px;
  padding:12px;
  cursor:pointer;
}

.notif-top{font-size:12px;opacity:0.7}
.notif-name{font-weight:bold}
.notif-msg{font-size:13px;opacity:0.9}

.tap{
  position:absolute;
  bottom:100px;
  opacity:0.6;
}

/* PIN */
#pin{background:black;color:white}

.dots{margin:20px}
.dot{
  width:14px;height:14px;
  border-radius:50%;
  border:1px solid #aaa;
  display:inline-block;
  margin:6px;
}
.filled{background:white}

.keypad{
  display:grid;
  grid-template-columns:repeat(3,80px);
  gap:18px;
}
.key{
  width:80px;height:80px;
  border-radius:50%;
  background:#1c1c1e;
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:24px;
}

/* PHONE */
#phone{
  width:340px;
  height:620px;
  background:#efeae2;
  border-radius:25px;
  overflow:hidden;
  display:flex;
  flex-direction:column;
  box-shadow:0 10px 30px rgba(0,0,0,0.4);
}

/* HEADER */
#header{
  background:#075e54;
  color:white;
  padding:10px;
  display:flex;
  gap:10px;
  align-items:center;
}

#avatar{
  width:35px;height:35px;
  border-radius:50%;
  background:url('https://i.imgur.com/1X6fQ9K.png') center/cover;
  cursor:pointer;
}

#status{font-size:11px;opacity:0.8}

/* CHAT */
#chat{
  flex:1;
  padding:10px;
  overflow-y:auto;
  display:flex;
  flex-direction:column;
  background:url('https://i.imgur.com/8Km9tLL.png') center/cover;
}

.msg{
  max-width:75%;
  padding:8px 10px;
  margin:6px 0;
  border-radius:10px;
  font-size:14px;
}

.me{background:#dcf8c6;align-self:flex-end}
.other{background:white;align-self:flex-start}

.time{
  font-size:10px;
  color:#666;
  text-align:right;
}

.check{
  color:#34b7f1;
  margin-left:4px;
}

/* CONTACT */
#contact{
  background:#111;
  color:white;
  text-align:center;
  gap:15px;
}

#contact img{
  width:120px;
  border-radius:50%;
}

/* INPUT (opcional estilo WhatsApp) */
</style>
</head>

<body>

<!-- LOCK -->
<div id="lock" class="screen active">
  <div class="timeBig" id="time"></div>

  <div class="notif" onclick="openNotif()">
    <div class="notif-top">💬 WhatsApp</div>
    <div class="notif-name">Mi amor 💙</div>
    <div class="notif-msg">Hola mi amor 💕</div>
  </div>

  <div class="tap" onclick="show('pin')">Toca para desbloquear</div>
</div>

<!-- PIN -->
<div id="pin" class="screen">
  <h2>Introduce código</h2>
  <div class="dots" id="dots"></div>

  <div class="keypad">
    <div onclick="press(1)" class="key">1</div>
    <div onclick="press(2)" class="key">2</div>
    <div onclick="press(3)" class="key">3</div>
    <div onclick="press(4)" class="key">4</div>
    <div onclick="press(5)" class="key">5</div>
    <div onclick="press(6)" class="key">6</div>
    <div onclick="press(7)" class="key">7</div>
    <div onclick="press(8)" class="key">8</div>
    <div onclick="press(9)" class="key">9</div>
  </div>
</div>

<!-- APP -->
<div id="app" class="screen">
  <div id="phone">

    <div id="header">
      <div id="avatar"></div>
      <div>
        <div>Mi amor 💙</div>
        <div id="status">en línea</div>
      </div>
    </div>

    <div id="chat"></div>

  </div>
</div>

<!-- CONTACT -->
<div id="contact" class="screen" onclick="goIndex()">
  <img src="https://i.imgur.com/1X6fQ9K.png">
  <h2>Mi amor 💙</h2>
  <p>Eres lo mejor que me ha pasado ❤️</p>
</div>

<script>

// TIME
setInterval(()=>{
  let d=new Date();
  time.innerText=d.getHours()+":"+String(d.getMinutes()).padStart(2,'0');
},1000);

// SCREEN
function show(id){
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

function openNotif(){
  show("pin");
}

// PIN
let code="";
let correct="1234";

function press(n){
  if(code.length<4){
    code+=n;
    draw();
  }
  if(code.length==4){
    if(code===correct) show("app");
    else {code=""; draw();}
  }
}

function draw(){
  dots.innerHTML="";
  for(let i=0;i<4;i++){
    let d=document.createElement("div");
    d.className="dot"+(i<code.length?" filled":"");
    dots.appendChild(d);
  }
}

// CHAT
const chat=document.getElementById("chat");
const status=document.getElementById("status");

const messages=[
  {text:"Hola mi amor 💕",type:"other"},
  {text:"Hola bebé 😍",type:"me"},
  {text:"Te extraño",type:"other"},
  {text:"Yo más ❤️",type:"me"},
  {text:"Te amo",type:"other"},
  {text:"Te amo más 💙",type:"me"}
];

let i=0;

function addMessage(m){
  const div=document.createElement("div");
  div.className="msg "+m.type;

  div.innerHTML=`
    ${m.text}
    <div class="time">${new Date().getHours()}:${String(new Date().getMinutes()).padStart(2,'0')}
      ${m.type==="me" ? '<span class="check">✔✔</span>' : ''}
    </div>
  `;

  chat.appendChild(div);
  chat.scrollTop=chat.scrollHeight;

  // leído animación
  if(m.type==="me"){
    let check=div.querySelector(".check");
    setTimeout(()=>check.style.color="#aaa",800);
    setTimeout(()=>check.style.color="#34b7f1",1600);
  }
}

function next(){
  if(i>=messages.length) return;

  let m=messages[i];

  if(m.type==="other"){
    status.textContent="escribiendo...";
    setTimeout(()=>{
      status.textContent="en línea";
      addMessage(m);
      i++;
      setTimeout(next,1200);
    },1200);
  }else{
    addMessage(m);
    i++;
    setTimeout(next,1200);
  }
}

next();

// PROFILE → INDEX
document.getElementById("avatar").onclick=()=>{
  show("contact");
};

function goIndex(){
  window.location.href="index.html";
}

</script>

</body>
</html>
