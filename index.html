<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💖 Para ti</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap');

body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background: linear-gradient(135deg, #ffd1dc, #c1d3ff);
  font-family:'Poppins', sans-serif;
  overflow:hidden;
}

/* tarjeta */
.card{
  text-align:center;
}

/* FOTO */
.foto{
  width:280px;
  height:280px;
  object-fit:cover;
  border-radius:25px;
  box-shadow:0 20px 50px rgba(0,0,0,0.3);
  cursor:pointer;
  transition:0.4s;
}

/* animación al activar */
.foto.active{
  transform:scale(1.05);
  box-shadow:0 0 40px rgba(255,105,135,0.8);
}

/* texto */
.texto{
  margin-top:15px;
  font-size:15px;
  color:#333;
  opacity:0;
  transform:translateY(10px);
  transition:0.6s;
}

.texto.show{
  opacity:1;
  transform:translateY(0);
}

/* botón oculto (opcional) */
.info{
  margin-top:10px;
  font-size:12px;
  opacity:0.5;
}
</style>
</head>

<body>

<div class="card">

  <!-- FOTO -->
  <img src="cassete.jpg" class="foto" id="foto">

  <div class="texto" id="texto">
    💖 Esta foto guarda un recuerdo contigo<br>
    🎵 cada vez que la tocas, suena lo que siento por ti
  </div>

  <div class="info">toca la imagen 💫</div>

</div>

<!-- AUDIO -->
<audio id="audio">
  <source src="cancion.mp3" type="audio/mpeg">
</audio>

<script>
const foto = document.getElementById("foto");
const audio = document.getElementById("audio");
const texto = document.getElementById("texto");

foto.addEventListener("click", () => {

  // reproducir música
  audio.play();

  // animación foto
  foto.classList.add("active");

  // mostrar mensaje
  texto.classList.add("show");
});
</script>

</body>
</html>
