<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>23 NO Cumpleaños.💖</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap');

body{
  margin:0;
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background: linear-gradient(135deg, #ffd1dc, #c1d3ff);
  font-family:'Poppins', sans-serif;
  overflow:hidden;
}

/* CONTENEDOR */
.container{
  display:flex;
  gap:18px;
  align-items:center;
  position: relative; /* 👈 importante */
}

/* FOTO PRINCIPAL */
.foto1{
  width:260px;
  height:260px;
  object-fit:cover;
  border-radius:22px;
  cursor:pointer;
  transition:0.4s;
}

.foto1.active{
  transform:scale(1.04);
}

/* FOTO CARTA */

.carta{
  position: absolute;
  top: 0;
  left: 0; /* 👈 empieza encima del cassette */

  width: 260px;
  height: 260px;
  object-fit: cover;
  border-radius: 22px;
  cursor: pointer;

  opacity: 0;
  transform: translate(0, 0) scale(0.9); /* 👈 escondida */
  transition: 0.7s cubic-bezier(.68,-0.55,.27,1.55);

  z-index: 5;
}

/* 🎬 cuando sale */
.carta.show{
  opacity: 1;
  transform: translate(140px, -120px) scale(1); 
  /* 👉 mueve derecha y arriba (ajustable) */
}

/* 📱 RESPONSIVE */

@media (max-width:768px){

  body{
    padding:20px;
  }

  .container{
    flex-direction:column;
  }

  .foto1{
    width:260px;
    height:260px;
    object-fit:contain;
  }

  .carta{
    width:200px;
    height:200px;
    top: 0;
    right: 0;
  }
}

</style>
</head>

<body>

<div class="container">

  <!-- FOTO 1 -->
  <img src="cassete.png" class="foto1" id="foto1">

  <!-- FOTO 2 (CARTA) -->
  <img src="foti.png" class="carta" id="carta">

</div>

<!-- AUDIO -->
<audio id="audio" preload="auto" playsinline>
  <source src="Rauw Alejandro - Algo Mágico.mp3" type="audio/mpeg">
</audio>

<script>
const foto1 = document.getElementById("foto1");
const carta = document.getElementById("carta");
const audio = document.getElementById("audio");

/* CLICK PRINCIPAL */
foto1.addEventListener("click", () => {

  audio.currentTime = 0;
  audio.play().catch(()=>{}); // evita errores en móvil

  foto1.classList.add("active");
  carta.classList.add("show");

});

/* CLICK EN LA CARTA → IR A INDEX */
carta.addEventListener("click", () => {
  window.location.href = "index.html";
});
</script>

</body>
</html>
