<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Super Caja</title>

<style>
body{
  background:#fff0f3;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  font-family: Arial;
}

.caja{
  background:white;
  padding:30px;
  border-radius:15px;
  text-align:center;
  box-shadow:0 0 15px rgba(0,0,0,0.2);
  cursor:pointer;
}

.mensaje{
  display:none;
  margin-top:15px;
}
</style>
</head>

<body>

<div class="caja" onclick="abrir()">
  <h1>🎁 Haz clic para abrir</h1>
  <div class="mensaje" id="msg">
    <p>¡Sorpresa! 💖 Eres increíble</p>
  </div>
</div>

<script>
function abrir(){
  document.getElementById("msg").style.display="block";
}
</script>

</body>
</html>
